apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vrc-queue-monitor
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"

    ## argocd-image-updater: mainブランチpush時に v0.<sha> タグで自動更新
    argocd-image-updater.argoproj.io/image-list: >-
      backend=ghcr.io/p-nasimonan/vrc-queue-monitor/backend,
      frontend=ghcr.io/p-nasimonan/vrc-queue-monitor/frontend

    argocd-image-updater.argoproj.io/backend.update-strategy: newest-build
    argocd-image-updater.argoproj.io/frontend.update-strategy: newest-build

    ## mainブランチのCIが付与する v0.<sha> タグのみ対象
    argocd-image-updater.argoproj.io/backend.allow-tags: regexp:^v[0-9]
    argocd-image-updater.argoproj.io/frontend.allow-tags: regexp:^v[0-9]

    ## write-back: ArgoCD Application のパラメータオーバーライドとして保存
    argocd-image-updater.argoproj.io/write-back-method: argocd

    ## 更新するHelmパラメータ（タグのみ; repositoryはChart側で固定）
    argocd-image-updater.argoproj.io/backend.helm.image-tag: backend.image.tag
    argocd-image-updater.argoproj.io/frontend.helm.image-tag: frontend.image.tag

spec:
  project: default
  source:
    repoURL: https://github.com/p-nasimonan/vrc-queue-monitor.git
    targetRevision: HEAD
    path: charts/vrc-queue-monitor
    helm:
      releaseName: vrc-queue-monitor
      valueFiles:
        - values.yaml
      ## シークレットは別途 SealedSecret または外部で管理
      ## values.yaml の secrets.existingSecret に Secret 名を指定すること

  destination:
    server: https://kubernetes.default.svc
    namespace: vrc-monitor  # 変更する場合は namespaceOverride も合わせて設定

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
