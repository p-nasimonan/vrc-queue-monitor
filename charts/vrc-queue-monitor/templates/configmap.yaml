## フロントエンド ConfigMap
{{- if .Values.frontend.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-frontend-config
  labels:
    {{- include "vrc-queue-monitor.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
data:
  {{- with .Values.frontend.config }}
  {{- toYaml . | nindent 2 }}
  {{- end }}
  ## バックエンドAPIのURLを自動生成（サーバーサイド環境変数）
  {{- if not (hasKey .Values.frontend.config "BACKEND_API_URL") }}
  BACKEND_API_URL: "http://{{ .Release.Name }}-backend-api.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.backendApi.service.port }}"
  {{- end }}
{{- end }}
---
## バックエンド共通 ConfigMap（API・コレクター共用）
{{- if or .Values.backendApi.enabled .Values.backendCollector.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-backend-config
  labels:
    {{- include "vrc-queue-monitor.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
data:
  {{- with .Values.backend.config }}
  {{- toYaml . | nindent 2 }}
  {{- end }}
  DB_HOST: {{ .Release.Name }}-postgres
  DB_PORT: "{{ .Values.postgres.service.port }}"
  DB_NAME: {{ .Values.postgres.config.DB_NAME }}
  DB_USER: {{ .Values.postgres.config.DB_USER }}
{{- end }}
