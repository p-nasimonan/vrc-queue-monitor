{{- if .Values.backendApi.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-backend-api
  labels:
    {{- include "vrc-queue-monitor.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend-api
spec:
  replicas: {{ .Values.backendApi.replicaCount }}
  selector:
    matchLabels:
      {{- include "vrc-queue-monitor.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend-api
  template:
    metadata:
      labels:
        {{- include "vrc-queue-monitor.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend-api
    spec:
      containers:
        - name: backend-api
          image: {{ include "vrc-queue-monitor.image" (dict "root" . "name" .Values.backendApi.image.name "tag" (coalesce .Values.backendApi.image.tag .Values.backend.image.tag)) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          workingDir: /app
          command: {{ toJson (default (list "python" "/app/api.py") .Values.backendApi.command) }}
          ports:
            - containerPort: {{ .Values.backendApi.service.port }}
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-backend-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "vrc-queue-monitor.secretName" . }}
                  key: DB_PASSWORD
          resources:
            {{- toYaml .Values.backendApi.resources | nindent 12 }}
          startupProbe:
            httpGet:
              path: /
              port: {{ .Values.backendApi.service.port }}
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.backendApi.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.backendApi.service.port }}
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-backend-api
  labels:
    {{- include "vrc-queue-monitor.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend-api
spec:
  type: {{ .Values.backendApi.service.type }}
  selector:
    {{- include "vrc-queue-monitor.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend-api
  ports:
    - port: {{ .Values.backendApi.service.port }}
      targetPort: {{ .Values.backendApi.service.port }}
{{- end }}
